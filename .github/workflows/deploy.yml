name: AWS EC2 Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.7.0
        with:
          ssh-private-key: ${{ secrets.EC2_KEY }}

      - name: Deploy application
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'
            set -e

            # Ensure tools exist
            sudo dnf install -y git python3.12

            # First-time setup: clone repo if not a git repo
            if [ ! -d ~/chatbot_comp7940/.git ]; then
              rm -rf ~/chatbot_comp7940
              git clone https://github.com/IcyDurahan/comp7940-lab.git ~/chatbot_comp7940
            fi

            cd ~/chatbot_comp7940
            git pull origin main

            # Python venv + deps
            if [ ! -d venv ]; then
              python3.12 -m venv venv
            fi
            ./venv/bin/python -m pip install --upgrade pip
            ./venv/bin/python -m pip install -r requirements.txt

            # Restart bot
            pkill -f "python chatbot.py" || true
            nohup ./venv/bin/python chatbot.py > app.log 2>&1 &
          EOF